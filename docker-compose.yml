# ─────────────────────────────────────────────────────────────────────────────
# Named volumes for persistence across restarts
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  mlflow_artifacts:
  airflow_logs:

# ─────────────────────────────────────────────────────────────────────────────
# Shared environment for Airflow containers
# ─────────────────────────────────────────────────────────────────────────────
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://churnops:churnops_secret@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
    AIRFLOW__WEBSERVER__SECRET_KEY: "churnops-local-dev-secret"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    # ── churnops package access (Option a: mount + PYTHONPATH) ─────────────
    # src/ is bind-mounted at /opt/airflow/src so `import churnops` works
    # without rebuilding the Airflow image.  dags/ is on the path so the
    # `utils` sub-package (alerts, metrics) is importable by the DAG tasks.
    PYTHONPATH: "/opt/airflow/src:/opt/airflow/dags"
    # Runtime connection settings consumed by churnops.config / the DAG tasks.
    MLFLOW_TRACKING_URI: "http://mlflow:5000"
    KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    # API health URL using Docker container name (not localhost) so health checks
    # work from inside the Airflow container network.
    API_HEALTH_URL: "http://api:8000/health"
    # Postgres host/port as seen from inside the compose network (not the
    # 5433 host-mapped port) — used by the churn_monitoring DAG's default
    # monitoring_database_url (churnops.config.Settings). Overridden entirely
    # by DATABASE_URL if you point the monitoring layer at Supabase instead.
    POSTGRES_HOST: "postgres"
    POSTGRES_PORT: "5432"
    # Auto-install churnops runtime deps into the Airflow container on first
    # start (no custom Dockerfile required).  Remove packages that are already
    # bundled with the base image to speed up subsequent restarts.
    # sqlalchemy + psycopg2 (churn_monitoring DAG's dependencies) are already
    # bundled with the base apache-airflow image — Airflow's own metadata DB
    # connection needs them — so they're deliberately NOT listed below.
    # Adding an unpinned "sqlalchemy" here would risk a future upgrade past
    # the <2.0 ceiling apache-airflow 2.9.2 requires.
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      mlflow scikit-learn pandas pyarrow pyyaml
      confluent-kafka pydantic pydantic-settings joblib
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    # Bind-mount the entire repo sub-trees the DAG tasks need to access.
    # _REPO_ROOT inside the container resolves to /opt/airflow (parent of dags/).
    - ./src:/opt/airflow/src               # churnops Python package
    - ./configs:/opt/airflow/configs       # configs/airflow.yaml, model.yaml, etc.
    - ./pipelines:/opt/airflow/pipelines   # build_dataset.py, train_mlflow.py, …
    - ./data:/opt/airflow/data             # raw CSV + processed parquet splits
    - ./artifacts:/opt/airflow/artifacts   # reports, model artifacts
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. PostgreSQL 16 — creates mlflow / airflow / churnops databases via init
  # ───────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: churnops-postgres
    environment:
      POSTGRES_USER: churnops
      POSTGRES_PASSWORD: churnops_secret
      POSTGRES_DB: churnops
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U churnops -d churnops"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Kafka in KRaft mode (single broker, no ZooKeeper)
  # ───────────────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: churnops-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two listeners: EXTERNAL for host-machine clients (port 9092),
      #                INTERNAL for container-to-container traffic (port 29092)
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # One-shot container: creates the three required topics after Kafka is healthy
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: churnops-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --replication-factor 1 --partitions 3 \
          --topic telco.raw.customers
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --replication-factor 1 --partitions 3 \
          --topic telco.churn.predictions
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --replication-factor 1 --partitions 1 \
          --topic telco.deadletter
        echo "Topics created successfully."
        /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server kafka:29092
    restart: "no"

  # ───────────────────────────────────────────────────────────────────────────
  # 3. MLflow tracking server — custom image with psycopg2
  #    Internal port 5000 published on host 3000
  # ───────────────────────────────────────────────────────────────────────────
  mlflow:
    build:
      context: ./docker
      dockerfile: Dockerfile.mlflow
    image: churnops-mlflow:local
    container_name: churnops-mlflow
    environment:
      # Allow calls from Docker container-internal hostnames (e.g. mlflow:5000
      # from the Airflow containers). Without this, MLflow 3.14+ rejects requests
      # with non-localhost Host headers as DNS-rebinding protection.
      MLFLOW_ENABLE_HOSTNAME_HEADER_CHECK: "false"
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
    command:
      - "--backend-store-uri"
      - "postgresql+psycopg2://churnops:churnops_secret@postgres:5432/mlflow"
      - "--artifacts-destination"
      - "/mlflow/artifacts"
      - "--serve-artifacts"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "3000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ───────────────────────────────────────────────────────────────────────────
  # 4. Airflow — db migrate + admin user creation (one-shot)
  # ───────────────────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: churnops-airflow-init
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@churnops.local \
          --password admin || true
        echo "Airflow init complete."
    restart: "no"

  # Airflow webserver — host port 8080
  airflow-webserver:
    <<: *airflow-common
    container_name: churnops-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Airflow scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: churnops-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ───────────────────────────────────────────────────────────────────────────
  # 5. ChurnOps FastAPI prediction API — host port 8000
  #    Loads the sklearn production model from the MLflow registry at startup.
  #    Falls back to the baked-in joblib artifact if the registry is unreachable.
  #    Start: docker compose up api  (or docker compose up to include everything)
  # ───────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: churnops-api:local
    container_name: churnops-api
    environment:
      # Point the container at the internal MLflow service (not localhost:3000).
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      MODEL_SOURCE: "registry"
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: on-failure
