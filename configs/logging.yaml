version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"
  json:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: standard
    filename: logs/churnops.log
    maxBytes: 10485760   # 10 MB
    backupCount: 5
    encoding: utf-8

root:
  level: INFO
  handlers: [console]

loggers:
  churnops:
    level: DEBUG
    handlers: [console]
    propagate: false
  mlflow:
    level: WARNING
  confluent_kafka:
    level: WARNING
