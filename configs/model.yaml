# ─────────────────────────────────────────────────────────────────────────────
# Model training configuration
# ─────────────────────────────────────────────────────────────────────────────

# Which model to train by default (key from the `models` map below)
default_model: logistic_regression

models:
  logistic_regression:
    class: "sklearn.linear_model.LogisticRegression"
    params:
      class_weight: balanced
      max_iter: 1000
      random_state: 42
      solver: lbfgs
      C: 1.0

  random_forest:
    class: "sklearn.ensemble.RandomForestClassifier"
    params:
      n_estimators: 200
      max_depth: null
      class_weight: balanced
      random_state: 42
      n_jobs: -1

  gradient_boosting:
    class: "sklearn.ensemble.HistGradientBoostingClassifier"
    params:
      max_iter: 200
      learning_rate: 0.05
      max_depth: 5
      random_state: 42
      # HistGradientBoosting does not support class_weight natively;
      # use sample_weight at fit time (handled in train.py)

artifacts:
  base_dir: "artifacts/sklearn"
  pipeline_file: "pipeline.joblib"
  sidecar_file: "pipeline_meta.json"

# Minimum acceptable metric thresholds (used in test assertions)
thresholds:
  roc_auc: 0.80
  pr_auc:  0.55
  recall:  0.55

# ─────────────────────────────────────────────────────────────────────────────
# MLflow tracking & registry settings
# ─────────────────────────────────────────────────────────────────────────────
mlflow:
  # Tracking server URI — overridden by MLFLOW_TRACKING_URI env var or config.py
  tracking_uri: "http://localhost:3000"

  # Experiment all churn runs are logged to
  experiment_name: "churn-sklearn"

  # Registered model name in the Model Registry
  registered_model_name: "churn-classifier"

  # Metric used to compare versions and decide promotion (must be a logged test metric)
  promotion_metric: "test_roc_auc"

  # Aliases (modern API — no stage transitions)
  aliases:
    staging:    "staging"
    production: "production"

  # Log plots as artifacts?
  log_plots: true

  # Dataset version tag (bump when features or splits change)
  dataset_version: "v1"
